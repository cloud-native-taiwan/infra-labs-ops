---
- name: Deploy GPU Temperature Monitor
  hosts: openstack04
  become: true
  tasks:
    - name: Copy monitoring script
      ansible.builtin.copy:
        src: gpu_temp_monitor.sh
        dest: /usr/local/bin/gpu_temp_monitor.sh
        mode: "0755"
        owner: root
        group: root

    - name: Copy systemd service file
      ansible.builtin.copy:
        src: gpu-temp-monitor.service
        dest: /etc/systemd/system/gpu-temp-monitor.service
        mode: "0644"
        owner: root
        group: root
      register: gpu_service_file

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true
      when: gpu_service_file.changed

    - name: Enable and start GPU temperature monitor service
      ansible.builtin.systemd:
        name: gpu-temp-monitor
        enabled: true
        state: started
