---
node_num: 4
interface1: ens1f0np0
interface2: ens1f1np1
network_manage: true
manage_grub: true
grub_vfio_enable: true
grub_blacklist_nouveau: true
grub_iommu_enable: true
grub_cmdline_linux:
  - zswap.enabled=1
  - zswap.max_pool_percent=25
host_sysctl_config:
  vm.min_free_kbytes: 1310720
grub_cmdline_linux_default:
  - console=tty0
  - console=ttyS0,115200
  - no_timer_check
  - nofb
  - nomodeset
  - gfxpayload=text

# Machine-readable disruption hazards (see openstack01.yml header).
host_hazards:
  - key: numa_local_oom_history
    reason: >-
      Previously exposed 4 host NUMA nodes (L3-cache-as-NUMA-domain BIOS
      option), causing strict-pinned VMs to OOM on node 0 while the host had
      free RAM. BIOS since set to NPS1 + L3-as-NUMA disabled. After any
      reboot, confirm `lscpu` still reports a single NUMA node before
      returning the host to the scheduler; a BIOS regression reintroduces
      memory-pressure OOMs.
    source: docs/openstack04-numa-oom.md
  - key: canary_tier_mid
    reason: >-
      Highest memory-pressure compute/controller; treat as a meaningful but
      not first canary in rolling operations.
    source: docs/fleet-topology.md
    canary_tier: 50
