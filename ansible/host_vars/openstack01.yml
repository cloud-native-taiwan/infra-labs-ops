---
node_num: 1
interface1: enp1s0f0np0
interface2: enp1s0f1np1
network_manage: true
manage_grub: true
grub_vfio_enable: false
grub_blacklist_nouveau: false
grub_iommu_enable: true
grub_cmdline_linux:
  - zswap.enabled=1
  - zswap.max_pool_percent=25
host_sysctl_config:
  vm.min_free_kbytes: 2490368
grub_cmdline_linux_default:
  - console=tty0
  - console=ttyS0,115200
  - no_timer_check
  - nofb
  - nomodeset
  - gfxpayload=text

# Machine-readable disruption hazards consulted by the health-gate role and
# disruptive playbooks. Each entry: key (stable id), reason (why), source
# (doc reference), and optional flags (blocks_unattended, canary_tier).
host_hazards:
  - key: bond0_boot_failure
    reason: >-
      bond0 does not come up automatically after reboot (Mellanox DKMS /
      bonding module load-order race). Recovery needs a manual
      `systemctl restart networking` over an out-of-band path, so this host
      must never be rebooted unattended.
    source: docs/troubleshooting.md#bond-開機未起來已知問題openstack01
    blocks_unattended: true
  - key: canary_tier_last
    reason: >-
      Ceph bootstrap + mgr + only mon/mgr-bearing controller running the
      cephadm shell. Disrupt LAST in any rolling operation so the control
      surface stays available while earlier canaries are validated.
    source: docs/fleet-topology.md
    canary_tier: 90
