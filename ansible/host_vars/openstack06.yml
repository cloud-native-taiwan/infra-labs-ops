---
node_num: 6
interface1: enp179s0f0np0
interface2: enp179s0f1np1
network_manage: true
manage_grub: true
grub_vfio_enable: false
grub_blacklist_nouveau: false
grub_iommu_enable: true
grub_cmdline_linux:
  - zswap.enabled=1
  - zswap.max_pool_percent=25
host_sysctl_config:
  vm.min_free_kbytes: 327680
  # Ceph-only node: keep default overcommit heuristic (reject allocations instead of OOM-kill)
  vm.overcommit_memory: 0
grub_cmdline_linux_default:
  - console=tty0
  - console=ttyS0,115200
  - no_timer_check
  - nofb
  - nomodeset
  - gfxpayload=text

# Machine-readable disruption hazards (see openstack01.yml header).
host_hazards:
  - key: canary_tier_first
    reason: >-
      Pure Ceph OSD node — runs no OpenStack control plane, so disrupting it
      cannot take down APIs. Safest canary; disrupt FIRST in any rolling
      operation and validate before moving to control-plane hosts.
    source: docs/fleet-topology.md
    canary_tier: 10
