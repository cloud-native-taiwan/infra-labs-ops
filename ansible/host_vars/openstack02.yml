---
node_num: 2
interface1: enp1s0f0np0
interface2: enp1s0f1np1
network_manage: true
manage_grub: true
grub_vfio_enable: false
grub_blacklist_nouveau: false
grub_iommu_enable: true
grub_cmdline_linux:
  - zswap.enabled=1
  - zswap.max_pool_percent=25
host_sysctl_config:
  vm.min_free_kbytes: 2621440
grub_cmdline_linux_default:
  - console=tty0
  - console=ttyS0,115200
  - no_timer_check
  - nofb
  - nomodeset
  - gfxpayload=text

# Machine-readable disruption hazards (see openstack01.yml header).
host_hazards:
  - key: canary_tier_mid
    reason: >-
      Controller + Ceph mgr/storage/monitoring, but not the cephadm shell
      host. Disrupt after the pure-Ceph canary and before openstack01.
    source: docs/fleet-topology.md
    canary_tier: 60
