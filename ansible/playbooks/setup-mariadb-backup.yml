---
# Deploys scheduled MariaDB backups on the deploy host using
# kolla-ansible mariadb-backup (full daily, incremental hourly).
#
# Prerequisites:
#   1. globals.yml must contain: enable_mariabackup: "yes"
#   2. Run: kolla-ansible reconfigure -i <inventory> -t mariadb
#      This creates the backup user and metadata database.
#
# Backups are stored in the mariadb_backup Docker volume on the
# first controller node.
- name: Setup MariaDB backup scheduling
  hosts: deploy_host
  become: true
  vars:
    kolla_ansible_venv: "/home/{{ ansible_user }}/dib"
    kolla_inventory: /etc/kolla/multinode
    kolla_config_dir: /etc/kolla

  tasks:
    - name: Deploy full backup service
      ansible.builtin.copy:
        content: |
          [Unit]
          Description=MariaDB full backup via kolla-ansible
          Wants=network-online.target
          After=network-online.target

          [Service]
          Type=oneshot
          Environment=PATH={{ kolla_ansible_venv }}/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          Environment=VIRTUAL_ENV={{ kolla_ansible_venv }}
          Environment=KOLLA_CONFIG_PATH={{ kolla_config_dir }}
          ExecStart={{ kolla_ansible_venv }}/bin/kolla-ansible mariadb-backup -i {{ kolla_inventory }}
        dest: /etc/systemd/system/mariadb-backup-full.service
        owner: root
        group: root
        mode: "0644"

    - name: Deploy full backup timer (weekly Sunday 2 AM UTC)
      ansible.builtin.copy:
        content: |
          [Unit]
          Description=Weekly MariaDB full backup

          [Timer]
          OnCalendar=Sun *-*-* 02:00:00
          RandomizedDelaySec=300
          Persistent=true

          [Install]
          WantedBy=timers.target
        dest: /etc/systemd/system/mariadb-backup-full.timer
        owner: root
        group: root
        mode: "0644"

    - name: Deploy incremental backup service
      ansible.builtin.copy:
        content: |
          [Unit]
          Description=MariaDB incremental backup via kolla-ansible
          Wants=network-online.target
          After=network-online.target

          [Service]
          Type=oneshot
          Environment=PATH={{ kolla_ansible_venv }}/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          Environment=VIRTUAL_ENV={{ kolla_ansible_venv }}
          Environment=KOLLA_CONFIG_PATH={{ kolla_config_dir }}
          ExecStart={{ kolla_ansible_venv }}/bin/kolla-ansible mariadb-backup -i {{ kolla_inventory }} --incremental
        dest: /etc/systemd/system/mariadb-backup-incremental.service
        owner: root
        group: root
        mode: "0644"

    - name: Deploy incremental backup timer (daily at 2 AM UTC, skip Sunday)
      ansible.builtin.copy:
        content: |
          [Unit]
          Description=Daily MariaDB incremental backup

          [Timer]
          OnCalendar=Mon..Sat *-*-* 02:00:00
          RandomizedDelaySec=300
          Persistent=true

          [Install]
          WantedBy=timers.target
        dest: /etc/systemd/system/mariadb-backup-incremental.timer
        owner: root
        group: root
        mode: "0644"

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable and start full backup timer
      ansible.builtin.systemd:
        name: mariadb-backup-full.timer
        enabled: true
        state: started

    - name: Enable and start incremental backup timer
      ansible.builtin.systemd:
        name: mariadb-backup-incremental.timer
        enabled: true
        state: started
