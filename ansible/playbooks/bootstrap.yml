---
- name: Bootstrap Managed Hosts
  hosts: managed_hosts
  become: true
  roles:
    - role: base
    - role: network
    - role: mail
    - role: kvm
    - role: grub
    - role: swap
    - role: bbr
    - role: tuning
    - role: openstack05_battlemage
      when: battlemage_manage | default(false)

- name: Bootstrap Cephadm Host
  hosts: ceph_bootstrap
  become: true
  roles:
    - role: ceph-bootstrap
