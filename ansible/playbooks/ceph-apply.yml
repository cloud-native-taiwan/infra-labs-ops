---
- name: Apply Ceph configuration (requires -e ceph_iac_apply=true)
  hosts: ceph_bootstrap
  become: true
  gather_facts: true
  tasks:
    - name: Run Ceph config audit
      ansible.builtin.include_role:
        name: ceph-config
        tasks_from: audit.yml

    - name: Apply Ceph config changes
      ansible.builtin.include_role:
        name: ceph-config
        tasks_from: apply.yml
      when: ceph_iac_apply | bool

    - name: Reconcile Ceph host labels
      ansible.builtin.include_role:
        name: ceph-config
        tasks_from: labels.yml

    - name: Apply Ceph service specs
      ansible.builtin.include_role:
        name: ceph-config
        tasks_from: specs.yml
