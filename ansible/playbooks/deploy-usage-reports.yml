# Deploy usage_reports to the deploy host (not the OpenStack/Ceph fleet).
# The deploy host controls the cluster and runs operational tools.
#
# Container spec is defined in tools/usage_reports/docker-compose.yml
# (single source of truth). This playbook syncs source code and secrets
# to the remote host, then drives docker compose.
---
- name: Deploy usage_reports container
  hosts: deploy_host
  become: true
  vars:
    remote_base: /opt/infra-labs-tools
    remote_tool_dir: "{{ remote_base }}/usage_reports"
    local_tool_dir: "{{ playbook_dir }}/../../tools/usage_reports"
    local_vendor_src: "{{ playbook_dir }}/../../tools/period_reconcile"
    local_secrets_dir: "{{ playbook_dir }}/../private/tools/usage_reports"
    # Build-artifact excludes shared by both rsync tasks below; each task
    # appends its own source-specific excludes.
    rsync_common_excludes: >-
      --exclude=.venv
      --exclude=.git
      --exclude=__pycache__
      --exclude=.pytest_cache
      --exclude=.mypy_cache
      --exclude=.ruff_cache
      --exclude=.coverage
      --exclude='*.egg-info'

  tasks:
    - name: Create remote tool directory
      ansible.builtin.file:
        path: "{{ remote_tool_dir }}"
        state: directory
        mode: "0755"

    - name: Sync tool source to deploy host
      ansible.builtin.shell: >-
        rsync -azi --delete
        --rsync-path="sudo rsync"
        {{ rsync_common_excludes }}
        --exclude=.env
        --exclude=secrets
        --exclude=state
        --exclude=vendor
        "{{ local_tool_dir }}/"
        "{{ ansible_user | default('debian') }}@{{ ansible_host | default(inventory_hostname) }}:{{ remote_tool_dir }}/"
      delegate_to: localhost
      become: false
      register: rsync_result
      # rsync -i prints one line per changed file; an empty stdout means
      # nothing transferred, so the task is genuinely unchanged.
      changed_when: rsync_result.stdout | trim | length > 0

    - name: Create vendor directory for the period_reconcile wrapper
      ansible.builtin.file:
        path: "{{ remote_tool_dir }}/vendor"
        state: directory
        mode: "0755"

    # The Dockerfile build context is the tool dir, so it cannot COPY a sibling
    # tools/ package directly. Vendor the shared period_reconcile wrapper into
    # ./vendor/period_reconcile so `COPY vendor/period_reconcile/` resolves.
    # Source tree (state, .env, secrets) is excluded above by --exclude=vendor.
    - name: Vendor period_reconcile wrapper into the build context
      ansible.builtin.shell: >-
        rsync -azi --delete --delete-excluded
        --rsync-path="sudo rsync"
        {{ rsync_common_excludes }}
        --exclude=tests
        "{{ local_vendor_src }}/"
        "{{ ansible_user | default('debian') }}@{{ ansible_host | default(inventory_hostname) }}:{{ remote_tool_dir }}/vendor/period_reconcile/"
      delegate_to: localhost
      become: false
      register: vendor_rsync_result
      changed_when: vendor_rsync_result.stdout | trim | length > 0

    - name: Copy .env to deploy host
      ansible.builtin.copy:
        src: "{{ local_secrets_dir }}/.env"
        dest: "{{ remote_tool_dir }}/.env"
        mode: "0600"

    - name: Create remote secrets directory
      ansible.builtin.file:
        path: "{{ remote_tool_dir }}/secrets"
        state: directory
        mode: "0700"

    - name: Copy secret files to deploy host
      ansible.builtin.copy:
        src: "{{ local_secrets_dir }}/{{ item }}"
        dest: "{{ remote_tool_dir }}/secrets/{{ item }}"
        mode: "0600"
      loop:
        - clouds.yaml

    - name: Create persistent state directory (delivery manifest lives here)
      ansible.builtin.file:
        path: "{{ remote_tool_dir }}/state"
        state: directory
        mode: "0750"

    - name: Run pre-deploy verification on deploy host
      ansible.builtin.command:
        cmd: ./deploy/verify.sh
        chdir: "{{ remote_tool_dir }}"
      changed_when: false

    - name: Build and deploy via docker compose
      ansible.builtin.command:
        cmd: docker compose up -d --build
        chdir: "{{ remote_tool_dir }}"
      register: compose_result
      # `docker compose up` exits 0 even when nothing changed. Compose
      # reports its actions (build/create/recreate/start) on stderr, so
      # key change detection off those markers rather than the rc.
      changed_when: >-
        compose_result.stderr is search('(?i)(Built|Created|Recreated|Started|Building)')

    - name: Verify container is running
      community.docker.docker_container_info:
        name: usage-reports
      register: container_info
      failed_when: not container_info.exists or container_info.container.State.Status != 'running'
