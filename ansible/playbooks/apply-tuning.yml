---
- name: Apply sysctl and host tuning (rolling, one host at a time)
  hosts: managed_hosts
  become: true
  serial: 1
  tasks:
    # Intentionally duplicates the sysctl template path from roles/base/tasks/main.yml
    # so we can apply sysctl changes without running the full base role (SSH, apt, chrony, etc.)
    - name: Deploy sysctl tuning
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/base/templates/sysctl.conf.j2"
        dest: /etc/sysctl.d/99-infra-labs.conf
        owner: root
        group: root
        mode: "0644"
      register: sysctl_deployed

    - name: Reload sysctl
      ansible.builtin.command: sysctl --system
      changed_when: false
      when: sysctl_deployed.changed
  roles:
    - role: tuning

- name: Set Ceph OSD memory target on constrained hosts
  hosts: ceph_bootstrap
  become: true
  tasks:
    - name: Disable OSD memory autotune on openstack04
      ansible.builtin.command:
        cmd: cephadm shell -- ceph config set osd/host:openstack04 osd_memory_target_autotune false
      changed_when: true

    - name: Set OSD memory target 3GiB on openstack04
      ansible.builtin.command:
        cmd: cephadm shell -- ceph config set osd/host:openstack04 osd_memory_target 3221225472
      changed_when: true

    - name: Disable OSD memory autotune on openstack05
      ansible.builtin.command:
        cmd: cephadm shell -- ceph config set osd/host:openstack05 osd_memory_target_autotune false
      changed_when: true

    - name: Set OSD memory target 3GiB on openstack05
      ansible.builtin.command:
        cmd: cephadm shell -- ceph config set osd/host:openstack05 osd_memory_target 3221225472
      changed_when: true
