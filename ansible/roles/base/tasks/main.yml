---
- name: Ensure nf_conntrack module loads before sysctl
  ansible.builtin.copy:
    content: "nf_conntrack\n"
    dest: /etc/modules-load.d/nf_conntrack.conf
    owner: root
    group: root
    mode: "0644"

- name: Remove stale nf_conntrack hashsize override
  ansible.builtin.file:
    path: /etc/modprobe.d/nf_conntrack.conf
    state: absent

- name: Deploy sysctl tuning
  ansible.builtin.template:
    src: sysctl.conf.j2
    dest: /etc/sysctl.d/99-infra-labs.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload Sysctl

- name: Ensure SSH directory exists
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.ssh"
    state: directory
    mode: "0700"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

- name: Check authorized keys source on control node
  ansible.builtin.stat:
    path: "{{ ssh_authorized_keys_src }}"
  delegate_to: localhost
  become: false
  register: base_authorized_keys_src

- name: Fail when authorized keys source is missing
  ansible.builtin.fail:
    msg: "Create {{ ssh_authorized_keys_src }} before running playbooks/bootstrap.yml."
  when: not base_authorized_keys_src.stat.exists

- name: Deploy authorized keys
  ansible.builtin.copy:
    src: "{{ ssh_authorized_keys_src }}"
    dest: "/home/{{ ansible_user }}/.ssh/authorized_keys"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 300
  ignore_errors: true

- name: Install base packages
  ansible.builtin.apt:
    name: "{{ base_packages }}"
    state: present

- name: Use Japan pool for NTP
  ansible.builtin.replace:
    path: /etc/chrony/chrony.conf
    regexp: "{{ chrony_pool_from | regex_escape }}"
    replace: "{{ chrony_pool_to }}"
  notify: Restart Chrony

- name: Set cpupower governor
  ansible.builtin.command: "cpupower frequency-set -g {{ cpu_governor }}"
  changed_when: false
  failed_when: false

- name: Deploy unattended-upgrades config
  ansible.builtin.template:
    src: 50unattended-upgrades.j2
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    owner: root
    group: root
    mode: "0644"
