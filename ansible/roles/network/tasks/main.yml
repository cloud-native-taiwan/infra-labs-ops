---
- name: Check for systemd-resolved unit in /lib
  ansible.builtin.stat:
    path: /lib/systemd/system/systemd-resolved.service
  register: network_resolved_unit_lib

- name: Check for systemd-resolved unit in /usr/lib
  ansible.builtin.stat:
    path: /usr/lib/systemd/system/systemd-resolved.service
  register: network_resolved_unit_usr

# Point-of-apply refusal: do not template bond0 against NIC names that do not
# exist on the live host. The bond slaves come from inventory (interface1 /
# interface2); if a NIC was renamed by a firmware/kernel change the rendered
# config would silently produce a dead bond (the exact failure class behind
# openstack01's bond0 boot issue). Fail closed with the mismatch instead of
# guessing. ansible_facts.interfaces normalizes dots to underscores, so this
# only checks the physical slave NICs, not the bond0.<vlan> sub-interfaces.
- name: Assert inventory bond slave NICs exist on the live host
  ansible.builtin.assert:
    that:
      - interface1 in ansible_facts.interfaces
      - interface2 in ansible_facts.interfaces
    fail_msg: >-
      Refusing to template bond0 on {{ inventory_hostname }}: inventory bond
      slaves interface1={{ interface1 }} / interface2={{ interface2 }} do not
      both exist in live interfaces {{ ansible_facts.interfaces | sort }}.
      A NIC was likely renamed; fix host_vars/{{ inventory_hostname }}.yml to
      match the live names before applying, or networking will not come up.
    success_msg: "Bond slave NICs {{ interface1 }}, {{ interface2 }} present on {{ inventory_hostname }}."
  when: network_manage | default(true)

- name: Deploy bond0 template
  ansible.builtin.template:
    src: bond0.j2
    dest: /etc/network/interfaces.d/bond0
    owner: root
    group: root
    mode: "0644"
  when: network_manage | default(true)
  notify:
    - Restart Networking
    - Pause After Networking Restart
    - Wait For Connection After Network Restart

- name: Deploy resolved.conf
  ansible.builtin.template:
    src: resolved.conf.j2
    dest: /etc/systemd/resolved.conf
    owner: root
    group: root
    mode: "0644"
  when: network_resolved_unit_lib.stat.exists or network_resolved_unit_usr.stat.exists
  notify: Restart Resolved
