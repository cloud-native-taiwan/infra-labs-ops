---
- name: Redirect root mail alias
  ansible.builtin.lineinfile:
    path: /etc/aliases
    regexp: "^root:"
    line: "root: {{ root_mail_alias }}"
  notify:
    - Run Newaliases
    - Restart Exim4

- name: Deploy exim config
  ansible.builtin.template:
    src: update-exim4.conf.conf.j2
    dest: /etc/exim4/update-exim4.conf.conf
    owner: root
    group: root
    mode: "0644"
  notify:
    - Update Exim Config
    - Restart Exim4

- name: Find stale root_redirect router files
  ansible.builtin.find:
    paths: /etc/exim4/conf.d/router
    contains: "^root_redirect:"
    excludes:
      - "050_custom_root_redirect"
  register: stale_root_redirect_files

- name: Remove stale root_redirect router files
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ stale_root_redirect_files.files }}"
  notify:
    - Update Exim Config
    - Restart Exim4

- name: Deploy root redirect config
  ansible.builtin.template:
    src: 050_custom_root_redirect
    dest: /etc/exim4/conf.d/router/050_custom_root_redirect
    owner: root
    group: root
    mode: "0644"
  notify:
    - Update Exim Config
    - Restart Exim4

- name: Check exim password source on control node
  ansible.builtin.stat:
    path: "{{ mail_passwd_client_src }}"
  delegate_to: localhost
  become: false
  register: mail_passwd_client_src_stat

- name: Fail when exim password source is missing
  ansible.builtin.fail:
    msg: "Create {{ mail_passwd_client_src }} before running playbooks/bootstrap.yml."
  when: not mail_passwd_client_src_stat.stat.exists

- name: Deploy exim password file
  ansible.builtin.copy:
    src: "{{ mail_passwd_client_src }}"
    dest: /etc/exim4/passwd.client
    owner: root
    group: "{{ mail_passwd_client_group }}"
    mode: "0640"
  notify:
    - Update Exim Config
    - Restart Exim4

- name: Set mailname
  ansible.builtin.copy:
    content: "{{ mailname }}\n"
    dest: /etc/mailname
    owner: root
    group: root
    mode: "0644"
  notify:
    - Update Exim Config
    - Restart Exim4
