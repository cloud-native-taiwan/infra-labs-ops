---
haproxy_package_state: present
haproxy_service_enabled: true
haproxy_service_state: started
haproxy_fail_on_port_conflict: true

haproxy_bind_address: "*"
haproxy_http_port: 80
haproxy_https_port: 443

haproxy_cert_name: cloudnative.tw
haproxy_tls_certificate: /etc/letsencrypt/live/cloudnative.tw/fullchain.pem
haproxy_tls_private_key: /etc/letsencrypt/live/cloudnative.tw/privkey.pem
haproxy_cert_bundle_dir: /etc/haproxy/certs
haproxy_cert_bundle: "{{ haproxy_cert_bundle_dir }}/{{ haproxy_cert_name }}.pem"

haproxy_stats_socket: /run/haproxy/admin.sock
haproxy_global_maxconn: 4096
haproxy_default_timeout_connect: 5s
haproxy_default_timeout_client: 900s
haproxy_default_timeout_server: 900s
haproxy_default_timeout_http_request: 10s
haproxy_default_timeout_http_keep_alive: 10s
haproxy_default_timeout_queue: 30s
haproxy_default_timeout_tunnel: 1h

haproxy_ssl_bind_ciphers:
  - ECDHE-ECDSA-AES128-GCM-SHA256
  - ECDHE-RSA-AES128-GCM-SHA256
  - ECDHE-ECDSA-AES256-GCM-SHA384
  - ECDHE-RSA-AES256-GCM-SHA384
haproxy_ssl_bind_ciphersuites:
  - TLS_AES_128_GCM_SHA256
  - TLS_AES_256_GCM_SHA384
  - TLS_CHACHA20_POLY1305_SHA256
haproxy_ssl_bind_options: ssl-min-ver TLSv1.2 no-tls-tickets

haproxy_http_redirect_to_https: true
haproxy_unknown_host_status: 404

haproxy_http_routes:
  - name: harbor
    hostnames:
      - registry.cloudnative.tw
    backend: harbor
  - name: bmc
    hostnames:
      - bmc.cloudnative.tw
    backend: bmc

haproxy_backends:
  - name: harbor
    health_check:
      uri: /api/v2.0/health
      host: registry.cloudnative.tw
      expect_status: 200
    servers:
      - name: harbor
        address: 127.0.0.1:8443
        ssl: true
        verify: none
        sni: registry.cloudnative.tw
        check: true
  - name: bmc
    health_check:
      uri: /healthz
      host: bmc.cloudnative.tw
      expect_status: 200
    servers:
      - name: bmc
        address: 127.0.0.1:9080
        check: true
