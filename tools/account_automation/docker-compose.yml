services:
  account-automation:
    container_name: account-automation
    # Prebuilt by .github/workflows/build-tools.yml and pulled from GHCR.
    # Override the tag with IMAGE_TAG (e.g. a sha-<commit> tag) to pin/rollback.
    image: ghcr.io/cloud-native-taiwan/infra-labs-ops/account-automation:${IMAGE_TAG:-latest}
    env_file:
      - .env
    environment:
      TZ: Asia/Taipei
      INFRA_LABS_GOOGLE_SERVICE_ACCOUNT_JSON: /secrets/service-account.json
      OS_CLIENT_CONFIG_FILE: /secrets/clouds.yaml
    volumes:
      - ./secrets/service-account.json:/secrets/service-account.json:ro
      - ./secrets/clouds.yaml:/secrets/clouds.yaml:ro
    restart: unless-stopped
    stop_grace_period: 120s
    healthcheck:
      test: ["CMD", "pgrep", "-f", "supercronic"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s
