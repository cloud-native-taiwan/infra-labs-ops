[DEFAULT]
# Expose RBD image locations so Nova/Cinder can create copy-on-write clones
# from Glance images instead of downloading and flattening them. Without this
# every boot/snapshot/shelve does a full byte copy (qemu-img convert + upload),
# which is why shelving a GPU instance took minutes. Requires images stored as
# raw in the same Ceph cluster. Trade-off: backend location URLs (rbd://fsid/
# pool/image/snap, no credentials) become visible to users who can read the image.
show_image_direct_url = True
show_multiple_locations = True

[rbd]
# Skip writing all-zero chunks when uploading images to the RBD store.
# Glance defaults to writing every byte of a sparse raw image (holes
# included), so a 200 GiB instance disk holding only ~32 GiB of real data
# uploads the full 200 GiB to the HDD-backed images pool -- the cause of
# multi-hour shelve/snapshot uploads. With this enabled Glance skips
# all-zero objects (Ceph returns zeros for unwritten objects), cutting the
# write to the actual data size (~6x less in that case) and saving network
# and HDD throughput. Must live under [rbd] (the multistore backend name,
# per enabled_backends = ...,rbd:rbd), not [glance_store], or it is ignored.
rbd_thin_provisioning = True
