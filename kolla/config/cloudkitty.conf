# CloudKitty config overlay -- prometheus collector tuning.
#
# This overlay is merged on top of the kolla-ansible cloudkitty role's
# rendered cloudkitty.conf (via merge_configs). It carries ONLY the keys
# the role template does not emit. Everything driven by globals.yml is
# left to the role so we don't duplicate (and drift from) its values:
#   - [collect] collector            <- cloudkitty_collector_backend
#   - [collect] metrics_conf         <- auto-set when cloudkitty/metrics.yml exists
#   - [collector_prometheus] url     <- cloudkitty_prometheus_url (protocol-aware)
#   - [fetcher] backend              <- cloudkitty_fetcher_backend
#   - [fetcher_prometheus] metric / scope_attribute=id / url
#
# What remains here, and why:
#   - scope_key: the label on the *data* metrics (nova/cinder, see
#     metrics.yml) that identifies the project. The prometheus openstack
#     exporter emits `tenant_id`, NOT the CloudKitty default `project_id`;
#     a mismatch silently collects zero data. (This is distinct from the
#     fetcher's scope_attribute, which reads `id` off the identity metric
#     and is rendered correctly by the role.)
#   - period: the role does not set this; CloudKitty defaults to 3600s,
#     which overcharges short-lived VMs. 600s (10 min) balances fairness
#     against storage overhead. MUST stay in sync with the /6 divisor in
#     usage_reports' cloudkitty_service._qty_to_hours.
#   - wait_periods: wait this many periods before processing a window, so
#     late-arriving samples are included.
#
# Operational dependency (not a key here, but it breaks metering if wrong):
# the fetcher discovers scopes with an INSTANT query on the identity metric,
# which Prometheus only answers while the latest sample is within its
# query lookback-delta (default 5m). The openstack-exporter scrape interval
# (prometheus_openstack_exporter_interval in globals.yml) MUST stay below
# that, or the fetcher intermittently returns zero scopes and metering
# silently stalls. Keep it at 2m; do not raise it back to the kolla 10m
# default without also raising Prometheus --query.lookback-delta.

[collect]
scope_key = tenant_id
period = 600
wait_periods = 2
