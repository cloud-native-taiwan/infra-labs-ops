---
scrape_configs:
  - job_name: 'snmp'
    scrape_interval: 20s
    static_configs:
      - targets:
        - 192.168.7.15
    metrics_path: /snmp
    params:
      module: [if_mib]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 192.168.113.5:9116
