# Tracked kolla-build configuration.
#
# Why this file exists:
#   scripts/kolla-build-and-push.sh passes this file via --config-file. When
#   --config-file is given explicitly, oslo.config loads ONLY this file and
#   skips the default /etc/kolla/kolla-build.conf discovery (oslo.config
#   bug #1699324). That deliberately bypasses whatever profile/image filter
#   happens to live on the build host -- the cause of cloudkitty images
#   silently never being built -- so the full image set is reproducible
#   from the repo regardless of host state.
#
# Default (no --profile): kolla-build builds ALL images, which includes
# cloudkitty and influxdb. The profile below is only for TARGETED rebuilds:
#   kolla-build --config-file kolla/kolla-build.conf -b ubuntu \
#     --registry registry.cloudnative.tw --push --tag 2026.1-amd64 \
#     --profile cloudkitty
#
# Build params (base, registry, tag, push) are passed on the CLI by the
# script and intentionally NOT duplicated here to avoid drift.

[profiles]
# CloudKitty data path: API + processor + its storage backend (influxdb,
# per cloudkitty_storage_backend in kolla/globals.yml). Parent images
# (cloudkitty-base, openstack-base, base, influxdb base) are pulled in
# automatically. Note: the cloudkitty Horizon panel is baked into the
# `horizon` image at build time (enable_horizon_cloudkitty), so rebuild
# `horizon` separately if the dashboard panel is needed.
cloudkitty = cloudkitty-api,cloudkitty-processor,influxdb
